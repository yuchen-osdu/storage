components:
  schemas:
    Acl:
      type: object
      description: Access control lists defining which groups can view or own a record.
      properties:
        viewers:
          type: array
          description: List of valid groups which will have view/read privileges over
            the record.
          items:
            type: string
            example: data.default.viewers@opendes.contoso.com
        owners:
          type: array
          description: List of valid groups which will have write privileges over
            the record.
          items:
            type: string
            example: data.default.owners@opendes.contoso.com
      required:
      - owners
      - viewers
    Legal:
      type: object
      properties:
        legaltags:
          type: array
          description: List of legal tag names associated with this record.
          items:
            type: string
            example: opendes-Default-Legal-Tag
          minItems: 1
          uniqueItems: true
        otherRelevantDataCountries:
          type: array
          description: ISO 3166-1 alpha-2 country codes of other relevant data countries.
          items:
            type: string
            example: US
          minItems: 1
          uniqueItems: true
        status:
          type: string
          description: "Compliance status of the legal tags, assigned by the server."
          enum:
          - compliant
          - incompliant
          example: compliant
          readOnly: true
      required:
      - legaltags
      - otherRelevantDataCountries
    Record:
      type: object
      description: "An OSDU record containing a data payload, access control, legal\
        \ tags, and system-managed metadata."
      properties:
        id:
          type: string
          description: "Unique identifier in whole Data Ecosystem. When not provided,\
            \ Data Ecosystem will create and assign an id to the record. Must follow\
            \ the naming convention: {Data-Partition-Id}:{object-type}:{uuid}."
          example: common:work-product-component--wellLog:123456
          pattern: "^[\\w\\-\\.]+:[\\w-\\.]+:[\\w\\-\\.\\:\\%]+$"
        version:
          type: integer
          format: int64
          description: "Record version number, assigned by the server on each update."
          readOnly: true
        kind:
          type: string
          description: Record kind for which the schema information is applied to.
          example: common:wks:work-product-component--wellLog:1.0.0
        acl:
          $ref: "#/components/schemas/Acl"
          description: Access control lists for viewers and owners.
        legal:
          $ref: "#/components/schemas/Legal"
          description: Legal tags and other relevant data countries.
        data:
          type: object
          additionalProperties: true
          description: The record payload as a free-form JSON object.
          minProperties: 1
        ancestry:
          $ref: "#/components/schemas/RecordAncestry"
          description: Ancestry information listing parent record IDs.
        meta:
          type: array
          description: Optional array of meta sub-objects.
          items:
            type: object
            additionalProperties: true
        tags:
          type: object
          additionalProperties:
            type: string
          description: User-defined tags as key-value pairs.
        createUser:
          type: string
          description: User who created this record.
          readOnly: true
        createTime:
          type: string
          format: date-time
          description: ISO 8601 timestamp of record creation.
          readOnly: true
        modifyUser:
          type: string
          description: User who last modified this record.
          readOnly: true
        modifyTime:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the last modification.
          readOnly: true
      required:
      - acl
      - data
      - id
      - kind
      - legal
    RecordAncestry:
      type: object
      description: "Ancestry information for a record, listing the parent record references\
        \ from which this record was derived."
      properties:
        parents:
          type: array
          description: "List of parent records. Must follow the naming convention:\
            \ {parent-record-id}:{parent-record-version}."
          items:
            type: string
            example: opendes:osdu--wellbore:123456789:1
          uniqueItems: true
    CreateUpdateRecordsResponse:
      type: object
      description: Response object for record creation and update operations.
      properties:
        recordCount:
          type: integer
          format: int32
          description: Number of records that were successfully created or updated.
        recordIds:
          type: array
          description: List of record ids that were successfully created or updated.
          items:
            type: string
        skippedRecordIds:
          type: array
          description: List of record ids that were skipped (e.g. duplicates).
          items:
            type: string
        recordIdVersions:
          type: array
          description: List of record id:version pairs for the created or updated
            records.
          items:
            type: string
    AppError:
      type: object
      description: Standard error response returned by OSDU services.
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code.
          example: 400
        reason:
          type: string
          description: Short error reason.
          example: Bad Request
        message:
          type: string
          description: Detailed error message.
          example: Invalid record format.
    CopyRecordReferencesModel:
      type: object
      description: Request and response model for copying record references between
        collaboration spaces.
      properties:
        target:
          type: string
          description: Target collaboration space identifier.
          example: 4b3b1e00-a0d3-4583-b81c-6c2428cdc12a
        records:
          type: array
          description: List of record id and version pairs to copy.
          items:
            $ref: "#/components/schemas/RecordVersionModel"
    RecordVersionModel:
      type: object
      description: A record identifier with an optional version.
      properties:
        id:
          type: string
          description: Record identifier.
          example: opendes:ds:example-record:1
        version:
          type: string
          description: Record version number.
          example: "1728332172782"
    ReplayFilter:
      type: object
      description: Filter for restricting replay operations to specific record kinds.
      properties:
        kinds:
          type: array
          description: List of kinds to replay. Currently restricted to a single kind.
          items:
            type: string
          maxItems: 1
          minItems: 1
    ReplayRequest:
      type: object
      description: Request object for triggering a replay operation.
      properties:
        replayId:
          type: string
          description: "Optional client-supplied replay identifier. If omitted, the\
            \ server generates one."
          example: f506be08-b51f-4cdd-a9ee-d9454ad51600
        operation:
          type: string
          description: "The operation to perform. Valid values: 'replay', 'reindex'."
          example: reindex
          minLength: 1
        filter:
          $ref: "#/components/schemas/ReplayFilter"
          description: Optional filter to restrict the replay to specific kinds.
      required:
      - operation
    ReplayResponse:
      type: object
      description: Response object returned when a replay operation is triggered.
      properties:
        replayId:
          type: string
          description: Unique identifier for the triggered replay operation.
          example: f506be08-b51f-4cdd-a9ee-d9454ad51600
    DeleteRecordsException:
      type: object
      properties:
        cause:
          type: object
          properties:
            stackTrace:
              type: array
              items:
                type: object
                properties:
                  classLoaderName:
                    type: string
                  moduleName:
                    type: string
                  moduleVersion:
                    type: string
                  methodName:
                    type: string
                  fileName:
                    type: string
                  lineNumber:
                    type: integer
                    format: int32
                  nativeMethod:
                    type: boolean
                  className:
                    type: string
            message:
              type: string
            suppressed:
              type: array
              items:
                type: object
                properties:
                  stackTrace:
                    type: array
                    items:
                      type: object
                      properties:
                        classLoaderName:
                          type: string
                        moduleName:
                          type: string
                        moduleVersion:
                          type: string
                        methodName:
                          type: string
                        fileName:
                          type: string
                        lineNumber:
                          type: integer
                          format: int32
                        nativeMethod:
                          type: boolean
                        className:
                          type: string
                  message:
                    type: string
                  localizedMessage:
                    type: string
            localizedMessage:
              type: string
        stackTrace:
          type: array
          items:
            type: object
            properties:
              classLoaderName:
                type: string
              moduleName:
                type: string
              moduleVersion:
                type: string
              methodName:
                type: string
              fileName:
                type: string
              lineNumber:
                type: integer
                format: int32
              nativeMethod:
                type: boolean
              className:
                type: string
        notDeletedRecords:
          type: array
          items:
            $ref: "#/components/schemas/PairStringString"
        message:
          type: string
        suppressed:
          type: array
          items:
            type: object
            properties:
              stackTrace:
                type: array
                items:
                  type: object
                  properties:
                    classLoaderName:
                      type: string
                    moduleName:
                      type: string
                    moduleVersion:
                      type: string
                    methodName:
                      type: string
                    fileName:
                      type: string
                    lineNumber:
                      type: integer
                      format: int32
                    nativeMethod:
                      type: boolean
                    className:
                      type: string
              message:
                type: string
              localizedMessage:
                type: string
        localizedMessage:
          type: string
    PairStringString:
      type: object
      properties:
        left:
          type: string
        value:
          type: string
        key:
          type: string
        right:
          type: string
    MultiRecordIds:
      type: object
      description: Record ids
      properties:
        records:
          type: array
          items:
            type: string
          maxItems: 100
          minItems: 0
        attributes:
          type: array
          items:
            type: string
      required:
      - records
    MultiRecordInfo:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/Record"
        invalidRecords:
          type: array
          items:
            type: string
        retryRecords:
          type: array
          items:
            type: string
    MultiRecordRequest:
      type: object
      description: Record ids
      properties:
        records:
          type: array
          items:
            type: string
          maxItems: 20
          minItems: 1
      required:
      - records
    ConversionStatus:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        errors:
          type: array
          items:
            type: string
    MultiRecordResponse:
      type: object
      properties:
        records:
          type: array
          items:
            type: string
        notFound:
          type: array
          items:
            type: string
        conversionStatuses:
          type: array
          items:
            $ref: "#/components/schemas/ConversionStatus"
    PatchOperation:
      type: object
      description: A single JSON Patch operation for updating record metadata fields.
      properties:
        op:
          type: string
          description: Bulk update record operation.
          example: replace
        path:
          type: string
          description: Bulk update record path.
          example: /acl/owners
        value:
          type: array
          description: Bulk update record value(s).
          items:
            type: string
          minItems: 1
      required:
      - op
      - path
      - value
    RecordBulkUpdateParam:
      type: object
      description: Records to be updated
      properties:
        query:
          $ref: "#/components/schemas/RecordQuery"
          description: Record query condition.
        ops:
          type: array
          description: Record metadata operations.
          items:
            $ref: "#/components/schemas/PatchOperation"
      required:
      - ops
      - query
    RecordQuery:
      type: object
      description: Query for fetching multiple records by their IDs in a single request.
      properties:
        ids:
          type: array
          description: "List of record ids. Each record id must follow the naming\
            \ convention {Data-Partition-Id}:{dataset-name}:{record-type}:{version}."
          items:
            type: string
          maxItems: 500
          minItems: 1
      required:
      - ids
    BulkUpdateRecordsResponse:
      type: object
      description: Response object for bulk metadata update operations.
      properties:
        recordCount:
          type: integer
          format: int32
          description: Number of records that were successfully updated.
        recordIds:
          type: array
          description: List of record ids that were successfully updated.
          items:
            type: string
        notFoundRecordIds:
          type: array
          description: List of record ids that were not found.
          items:
            type: string
        unAuthorizedRecordIds:
          type: array
          description: List of record ids that the caller is not authorized to update.
          items:
            type: string
        lockedRecordIds:
          type: array
          description: List of record ids that are currently locked and cannot be
            updated.
          items:
            type: string
    JsonPatch: {}
    PatchRecordsRequestModel:
      type: object
      description: Records to be patched
      example:
        query:
          ids:
          - common:work-product-component--wellLog:123456
        ops:
        - op: remove
          path: /acl/viewers/0
      properties:
        query:
          $ref: "#/components/schemas/RecordQueryPatch"
          description: Record query condition.
        ops:
          $ref: "#/components/schemas/JsonPatch"
          description: Record patch operations.
      required:
      - ops
      - query
    RecordQueryPatch:
      type: object
      description: Represents a model for Record Query Patch
      example:
        ids:
        - common:work-product-component--wellLog:123456
      properties:
        ids:
          type: array
          description: "List of record ids. Each record id must follow the naming\
            \ convention {Data-Partition-Id}:{dataset-name}:{record-type}:{version}."
          items:
            type: string
      required:
      - ids
    PatchRecordsResponse:
      type: object
      description: Response object for record patch operations.
      properties:
        recordCount:
          type: integer
          format: int32
          description: Number of records that were successfully patched.
        recordIds:
          type: array
          description: List of record ids that were successfully patched.
          items:
            type: string
        notFoundRecordIds:
          type: array
          description: List of record ids that were not found.
          items:
            type: string
        failedRecordIds:
          type: array
          description: List of record ids that failed to be patched.
          items:
            type: string
        errors:
          type: array
          description: List of error messages for failed records.
          items:
            type: string
    RecordMergePatchRequest:
      type: object
      description: Data to be patched
      example:
        acl:
          viewers:
          - data.viewer@tenant.com
          owners:
          - data.owner@tenant.com
        legal:
          legaltags:
          - tenant-public-usa-dataset-1
          otherRelevantDataCountries:
          - US
        data:
          wellName: Updated Well Name
          status: active
        tags:
          environment: production
      properties:
        kind:
          type: string
          description: Record kind
        acl:
          $ref: "#/components/schemas/Acl"
          description: Access Control List for the record
        legal:
          $ref: "#/components/schemas/Legal"
          description: Legal information for the record
        data:
          type: object
          additionalProperties:
            type: object
          description: Record data
        tags:
          type: object
          additionalProperties:
            type: string
          description: Record tags as key-value pairs
        ancestry:
          $ref: "#/components/schemas/RecordAncestry"
          description: Record ancestry data
        deleted:
          type: boolean
          description: Soft delete flag - set to false to undelete
          example: false
        deletedAt:
          type: string
          description: Deletion timestamp - set to null to undelete
    ReplayStatus:
      type: object
      description: Status of a replay operation for a specific record kind.
      properties:
        kind:
          type: string
          description: Record kind being replayed.
          example: osdu:wks:master-data--Well:1.0.0
        totalRecords:
          type: integer
          format: int64
          description: Total number of records of this kind to be processed.
        processedRecords:
          type: integer
          format: int64
          description: Number of records of this kind processed so far.
        state:
          type: string
          description: State of the replay for this kind.
          example: IN_PROGRESS
        startedAt:
          type: string
          format: date-time
          description: Timestamp when processing of this kind started.
        elapsedTime:
          type: string
          description: Human-readable elapsed time for this kind.
          example: 0h 2m 15s
    ReplayStatusResponse:
      type: object
      description: Response object containing the status of a replay operation.
      properties:
        replayId:
          type: string
          description: Unique identifier of the replay operation.
          example: f506be08-b51f-4cdd-a9ee-d9454ad51600
        operation:
          type: string
          description: The operation type that was requested.
          example: reindex
        totalRecords:
          type: integer
          format: int64
          description: Total number of records to be processed.
        startedAt:
          type: string
          format: date-time
          description: Timestamp when the replay operation started.
        elapsedTime:
          type: string
          description: Human-readable elapsed time since the operation started.
          example: 0h 5m 30s
        processedRecords:
          type: integer
          format: int64
          description: Number of records processed so far.
        overallState:
          type: string
          description: Overall state of the replay operation.
          example: IN_PROGRESS
        filter:
          $ref: "#/components/schemas/ReplayFilter"
          description: Filter that was applied to the replay operation.
        status:
          type: array
          description: Per-kind status breakdown of the replay operation.
          items:
            $ref: "#/components/schemas/ReplayStatus"
    RecordVersions:
      type: object
      properties:
        recordId:
          type: string
        versions:
          type: array
          items:
            type: integer
            format: int64
    DatastoreQueryResult:
      type: object
      properties:
        cursor:
          type: string
        results:
          type: array
          items:
            type: string
    ConnectedOuterService:
      type: object
      description: Name and version of an external service that this OSDU service
        connects to.
      properties:
        name:
          type: string
          description: Name of the connected external service.
          example: storage
        version:
          type: string
          description: Version of the connected external service.
          example: 2.0.0
    FeatureFlagState:
      type: object
      description: State of a feature flag for a given partition and source.
      properties:
        name:
          type: string
          description: Name of the feature flag.
          example: collaborations-api
        enabled:
          type: boolean
          description: Whether the feature flag is currently enabled.
          example: true
        partition:
          type: string
          description: Data partition this flag applies to.
          example: opendes
        source:
          type: string
          description: Source configuration that provided this flag state.
          example: runtime
    VersionInfo:
      type: object
      description: Version and build information for an OSDU service.
      properties:
        groupId:
          type: string
          description: Maven group ID of the service artifact.
          example: org.opengroup.osdu
        artifactId:
          type: string
          description: Maven artifact ID of the service.
          example: os-search
        version:
          type: string
          description: Semantic version of the deployed service.
          example: 0.27.0
        buildTime:
          type: string
          description: ISO 8601 timestamp of the build.
          example: 2021-01-26T02:24:13.843Z
        branch:
          type: string
          description: Source control branch from which the service was built.
          example: main
        commitId:
          type: string
          description: Short commit SHA of the build.
          example: "7777777"
        commitMessage:
          type: string
          description: Commit message of the build.
          example: initial commit
        connectedOuterServices:
          type: array
          description: List of external services this service depends on.
          items:
            $ref: "#/components/schemas/ConnectedOuterService"
        featureFlagStates:
          type: array
          description: "Current feature flag states for this partition, if any."
          items:
            $ref: "#/components/schemas/FeatureFlagState"
  securitySchemes:
    Authorization:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: Authorization
